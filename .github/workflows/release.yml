name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Prerelease type (none = stable release)"
        type: choice
        required: true
        default: "none"
        options:
          - none
          - alpha
          - beta
          - rc
      shame:
        description: "Force a SHAME bump"
        type: boolean
        required: false
        default: false
      dry_run:
        description: "Dry run (no push, no release)"
        type: boolean
        required: false
        default: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cz.outputs.version }}
      tag: ${{ steps.cz.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # cz walks the full commit history to compute the target version
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git with SSH signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config --global user.name "crux-release"
          git config --global user.email "lowkey@kaffeinlabs.com"
          git config --global gpg.format ssh
          git config --global tag.gpgsign true
          git config --global commit.gpgsign true
          git config --global user.signingkey ~/.ssh/signing_key

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Bump version, tag, and capture release notes
        id: cz
        run: |
          PRE_FLAG=""
          if [ "${{ inputs.prerelease }}" != "none" ]; then
            PRE_FLAG="--prerelease ${{ inputs.prerelease }}"
          fi
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          INCREMENT_FLAG=""
          if [ "${{ inputs.shame }}" = "true" ]; then
            INCREMENT_FLAG="--increment PATCH"
          fi
          cz bump --yes --changelog --changelog-to-stdout $PRE_FLAG $INCREMENT_FLAG $DRY_FLAG > release_notes.md

          # In dry-run mode, no tag is created, so derive the *would-be* version from cz output
          NEW_VERSION=$(cz version --project)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version alignment
        run: |
          CZ_VERSION=$(cz version --project)
          SHARD_VERSION=$(awk '/^version:/ {print $2; exit}' shard.yml)
          if [ "$CZ_VERSION" != "$SHARD_VERSION" ]; then
            echo "::error::cz version ($CZ_VERSION) does not match shard.yml ($SHARD_VERSION)"
            exit 1
          fi

      - name: Push commit and tag
        if: inputs.dry_run != true
        run: git push --follow-tags

      - name: Upload release notes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build ${{ matrix.target_os }}-${{ matrix.target_arch }}
    needs: bump
    if: inputs.dry_run != true
    strategy:
      fail-fast: false
      matrix:
        include:
          #- os: macos-13
          #  target_os: darwin
          #  target_arch: x86_64
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-24.04
            target_os: linux
            target_arch: x86_64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: oprypin/install-crystal@d8ef131ecec0352ce0e39b81b0a6d95def58fe2f # v1
        with:
          crystal: "1.20.0"

      - name: Install shards
        run: shards install --production

      - name: Build binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.target_os }}" = "darwin" ]; then
            # Build against openssl3 specifically
            SSL_PREFIX="$(brew --prefix openssl@3)"
            # Reason: macOS ld prefers .dylib over .a when both exist in the same -L dir.
            # Removing the dylibs forces it to link libssl.a + libcrypto.a from the same prefix.
            # The runner is ephemeral so no cleanup needed.
            test -f "${SSL_PREFIX}/lib/libssl.a"    || { echo "libssl.a missing"; exit 1; }
            test -f "${SSL_PREFIX}/lib/libcrypto.a" || { echo "libcrypto.a missing"; exit 1; }
            rm -f "${SSL_PREFIX}/lib/libssl"*.dylib "${SSL_PREFIX}/lib/libcrypto"*.dylib

            rm -f "${SSL_PREFIX}/lib/libssl.dylib" "${SSL_PREFIX}/lib/libssl.3.dylib"
            #rm -f "${SSL_PREFIX}/lib/libcrypto.dylib" "${SSL_PREFIX}/lib/libcrypto.3.dylib"
            export PKG_CONFIG_PATH="${SSL_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            crystal build src/main.cr --release \
              --link-flags "-L${SSL_PREFIX}/lib" \
              -o dist/crux
          else
            crystal build src/main.cr --release -o dist/crux
          fi
          echo "Linked dylibs:"
          otool -L dist/crux 2>/dev/null || ldd dist/crux

      - name: Package and checksum
        run: |
          BIN="crux-${{ needs.bump.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}"
          cd dist
          tar -czf "${BIN}.tar.gz" crux
          shasum -a 256 "${BIN}.tar.gz" > "${BIN}.tar.gz.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: crux-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/crux-${{ needs.bump.outputs.version }}-*

  release:
    name: Publish release
    needs: [bump, build]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" != "none" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ needs.bump.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ needs.bump.outputs.tag }}" \
            --notes-file artifacts/release_notes.md \
            $PRERELEASE_FLAG \
            artifacts/crux-*

  bump-tap:
    name: Bump homebrew-tap formula
    needs: [bump, release]
    if: inputs.dry_run != true && inputs.prerelease == 'none'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: lowkeyliesmyth/homebrew-tap
          token: ${{ secrets.TAP_RELEASE }}
          path: tap

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Render formula
        env:
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          DARWIN_ARM64=$(awk '{print $1}' artifacts/crux-${VERSION}-darwin-arm64.tar.gz.sha256)
          LINUX_ARM64=$(awk '{print $1}'  artifacts/crux-${VERSION}-linux-arm64.tar.gz.sha256)
          LINUX_X86_64=$(awk '{print $1}' artifacts/crux-${VERSION}-linux-x86_64.tar.gz.sha256)

          cat > tap/Formula/crux.rb <<RUBY
          # AUTO-GENERATED by the crux release workflow.
          # Source of truth: https://github.com/lowkeyliesmyth/crux/blob/main/.github/workflows/release.yml
          # Do NOT edit by hand. Changes will be overwritten on the next crux release.
          class Crux < Formula
            desc "DevEx and operations CLI for everyday workflows"
            homepage "https://github.com/lowkeyliesmyth/crux"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/lowkeyliesmyth/crux/releases/download/#{version}/crux-#{version}-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/lowkeyliesmyth/crux/releases/download/#{version}/crux-#{version}-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/lowkeyliesmyth/crux/releases/download/#{version}/crux-#{version}-linux-x86_64.tar.gz"
                sha256 "${LINUX_X86_64}"
              end
            end

            def install
              bin.install "crux"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/crux version")
            end
          end
          RUBY

      - name: Open PR against homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_RELEASE }}
          VERSION: ${{ needs.bump.outputs.version }}
        working-directory: tap
        run: |
          BRANCH="bump-crux-${VERSION}"
          git config user.name  "crux-release"
          git config user.email "lowkey@kaffeinlabs.com"
          git checkout -b "${BRANCH}"
          git add Formula/crux.rb
          git commit -m "chore(crux): bump to ${VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore(crux): bump to ${VERSION}" \
            --body  "Auto-generated by the crux release workflow on tag \`${VERSION}\`." \
            --base main --head "${BRANCH}"
