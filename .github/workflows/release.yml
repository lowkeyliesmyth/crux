name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Prerelease type (none = stable release)"
        type: choice
        required: true
        default: "none"
        options:
          - none
          - alpha
          - beta
          - rc

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cz.outputs.version }}
      tag: ${{ steps.cz.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # cz walks the full commit history to compute the target version
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git with SSH signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_SSH_KEY }}
        # need to configure git with SSH signing before running the commitizen-action in order to sign both commits and tags
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config --global user.name "crux-release"
          git config --global user.email "release@users.noreply.github.com"
          git config --global gpg.format ssh
          git config --global tag.gpgsign true
          git config --global commit.gpgsign true
          git config --global user.signingkey ~/.ssh/signing_key

      - name: Run commitizen bump
        id: cz
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # 0.27.1
        with:
          github_token: ${{ secrets.RELEASE_PAT }}
          branch: main
          prerelease: ${{ inputs.prerelease == 'none' && '' || inputs.prerelease }}
          gpg_sign: true
          changelog_increment_filename: release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build ${{ matrix.target_os }}-${{ matrix.target_arch }}
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target_os: darwin
            target_arch: x86_64
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-24.04
            target_os: linux
            target_arch: x86_64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: oprypin/install-crystal@d8ef131ecec0352ce0e39b81b0a6d95def58fe2f # v1
        with:
          crystal: "1.20.0"

      - name: Install shards
        run: shards install --production

      - name: Build binary
        run: |
          mkdir -p dist
          crystal build src/main.cr --release -o dist/crux

      - name: Package and checksum
        run: |
          BIN="crux-${{ needs.bump.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}"
          cp dist/crux "dist/${BIN}"
          cd dist && shasum -a 256 "${BIN}" > "${BIN}.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: crux-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/crux-${{ needs.bump.outputs.version }}-*

  release:
    name: Publish release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" != "none" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ needs.bump.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ needs.bump.outputs.tag }}" \
            --notes-file artifacts/release_notes.md \
            $PRERELEASE_FLAG \
            artifacts/crux-*
