name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Prerelease type (none = stable release)"
        type: choice
        required: true
        default: "none"
        options:
          - none
          - alpha
          - beta
          - rc
      dry_run:
        description: "Dry run (no push, no release)"
        type: boolean
        required: false
        default: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cz.outputs.version }}
      tag: ${{ steps.cz.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # cz walks the full commit history to compute the target version
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git with SSH signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config --global user.name "crux-release"
          git config --global user.email "lowkey@kaffeinlabs.com"
          git config --global gpg.format ssh
          git config --global tag.gpgsign true
          git config --global commit.gpgsign true
          git config --global user.signingkey ~/.ssh/signing_key

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Bump version, tag, and capture release notes
        id: cz
        run: |
          PRE_FLAG=""
          if [ "${{ inputs.prerelease }}" != "none" ]; then
            PRE_FLAG="--prerelease ${{ inputs.prerelease }}"
          fi
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          cz bump --yes --changelog --changelog-to-stdout $PRE_FLAG $DRY_FLAG > release_notes.md
          # In dry-run mode, no tag is created, so derive the *would-be* version from cz output
          NEW_VERSION=$(cz version --project)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        if: inputs.dry_run != true
        run: git push --follow-tags

      - name: Upload release notes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build ${{ matrix.target_os }}-${{ matrix.target_arch }}
    needs: bump
    if: inputs.dry_run != true
    strategy:
      fail-fast: false
      matrix:
        include:
          #- os: macos-13
          #  target_os: darwin
          #  target_arch: x86_64
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-24.04
            target_os: linux
            target_arch: x86_64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: oprypin/install-crystal@d8ef131ecec0352ce0e39b81b0a6d95def58fe2f # v1
        with:
          crystal: "1.20.0"

      - name: Install shards
        run: shards install --production

      - name: Build binary
        run: |
          mkdir -p dist
          crystal build src/main.cr --release -o dist/crux

      - name: Package and checksum
        run: |
          BIN="crux-${{ needs.bump.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}"
          cd dist
          tar -czf "${BIN}.tar.gz" crux
          shasum -a 256 "${BIN}.tar.gz" > "${BIN}.tar.gz.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: crux-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/crux-${{ needs.bump.outputs.version }}-*

  release:
    name: Publish release
    needs: [bump, build]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" != "none" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ needs.bump.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ needs.bump.outputs.tag }}" \
            --notes-file artifacts/release_notes.md \
            $PRERELEASE_FLAG \
            artifacts/crux-*
